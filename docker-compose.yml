version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # 1. Reverse Proxy (Nginx)
  # ----------------------------------------------------------------------------
  proxy:
    image: nginx:alpine
    container_name: calcupedev_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - portal
      - api_epi
      - api_stat
    networks:
      - calcupedev_net
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # 2. Portal Web (Frontend Central Vite/React o HTML srv)
  # ----------------------------------------------------------------------------
  portal:
    build: 
      context: ./portal
      dockerfile: Dockerfile
    container_name: calcupedev_portal
    networks:
      - calcupedev_net
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # 3. Micro-servicio: Epidemiología (R-Shiny)
  # ----------------------------------------------------------------------------
  api_epi:
    build: 
      context: ./api_epi
      dockerfile: Dockerfile
    container_name: calcupedev_api_epi
    networks:
      - calcupedev_net
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # 4. Micro-servicio: Estadística (R-Shiny)
  # ----------------------------------------------------------------------------
  api_stat:
    build: 
      context: ./api_stat
      dockerfile: Dockerfile
    container_name: calcupedev_api_stat
    networks:
      - calcupedev_net
    restart: unless-stopped

networks:
  calcupedev_net:
    driver: bridge
